<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
</head>

<body>

<h1>Admin Panel</h1>

<!-- ===================== -->
<!-- MENU -->
<!-- ===================== -->

<h2>Add Food</h2>

<input id="name" placeholder="Food name">
<input id="price" placeholder="Price">

<button id="btn">Add Food</button>

<h2>Menu List</h2>
<ul id="list"></ul>

<hr>

<!-- ===================== -->
<!-- BOOKINGS -->
<!-- ===================== -->

<h2>Reservations</h2>

<table border="1">
    <thead>
        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Guests</th>
            <th>Date</th>
            <th>Time</th>
        </tr>
    </thead>

    <tbody id="bookingTable"></tbody>
</table>

<hr>

<!-- ===================== -->
<!-- USERS -->
<!-- ===================== -->

<h2>Users</h2>

<table border="1">
    <thead>
        <tr>
            <th>Email</th>
            <th>Created At</th>
        </tr>
    </thead>

    <tbody id="usersTable"></tbody>
</table>

<!-- ===================== -->
<!-- FIREBASE SCRIPT -->
<!-- ===================== -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCVFAE8v-mudFvGpihmKnl2XqMWLuPrXPI",
    authDomain: "food-paradise-fc605.firebaseapp.com",
    projectId: "food-paradise-fc605",
    storageBucket: "food-paradise-fc605.firebasestorage.app",
    messagingSenderId: "278563151495",
    appId: "1:278563151495:web:2ec37e1f8e519d84136222"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



// =====================
// ADD FOOD
// =====================

document.getElementById("btn")
.addEventListener("click", async () => {

    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;

    if (!name || !price) {
        alert("Fill all fields");
        return;
    }

    await addDoc(collection(db, "menu"), {
        name,
        price
    });

    alert("Food Added ✅");

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
});



// =====================
// MENU LIST
// =====================

onSnapshot(collection(db, "menu"), (snapshot) => {

    const list = document.getElementById("list");

    list.innerHTML = "";

    snapshot.forEach((doc) => {

        const data = doc.data();

        list.innerHTML += `
            <li>${data.name} - ${data.price} DT</li>
        `;
    });
});



// =====================
// BOOKINGS
// =====================

const bookingTable = document.getElementById("bookingTable");

onSnapshot(collection(db, "bookings"), (snapshot) => {

    bookingTable.innerHTML = "";

    snapshot.forEach((doc) => {

        const data = doc.data();

        bookingTable.innerHTML += `
            <tr>
                <td>${data.name || ""}</td>
                <td>${data.phone || ""}</td>
                <td>${data.people || ""}</td>
                <td>${data.date || ""}</td>
                <td>${data.time || ""}</td>
            </tr>
        `;
    });
});



// =====================
// USERS
// =====================

const usersTable = document.getElementById("usersTable");

onSnapshot(collection(db, "users"), (snapshot) => {

    usersTable.innerHTML = "";

    snapshot.forEach((doc) => {

        const data = doc.data();

        usersTable.innerHTML += `
            <tr>
                <td>${data.email || ""}</td>
                <td>${data.createdAt || ""}</td>
            </tr>
        `;
    });
});

</script>

</body>
</html>
